<!DOCTYPE html>
<html>
<head>
    <title>Deadball Dice Companion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Deadball">
    <meta name="theme-color" content="#137333">
    <link rel="manifest" href="deadball.webmanifest">
    <style>
        body { font-family: sans-serif; background: #f4f4f6; color: #333; margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        h2 { margin: 0 0 10px 0; font-size: 20px; }
        .row { margin: 8px 0; }
        .section-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; color: #555; }
        button { font-size: 16px; padding: 8px 16px; margin: 3px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; background: #fff; transition: opacity 0.2s, border-color 0.2s; }
        .active-p { background: #0055ff; color: white; border-color: #0033aa; }
        .active-b { background: #137333; color: white; border-color: #0b4b21; }
        .active-hand { background: #222; color: white; border-color: #000; }
        .active-out { background: #c5221f; color: white; border-color: #a61c19; }
        .active-hp { background: #7c3aed; color: white; border-color: #5b21b6; }
        .illuminate { border-color: #ff3333 !important; border-width: 2px; animation: aggressive-pulse 0.8s infinite alternate; }
        @keyframes aggressive-pulse { from { background-color: #fff; color: #333; box-shadow: 0 0 4px rgba(255, 51, 51, 0.2); } to { background-color: #ff3333; color: #fff; border-color: #b30000 !important; box-shadow: 0 0 16px rgba(255, 51, 51, 0.8); } }
        .illuminate-trait { border-color: #7c3aed !important; border-width: 2px; animation: trait-pulse 0.9s infinite alternate; }
        @keyframes trait-pulse { from { background-color: #fff; color: #333; box-shadow: 0 0 3px rgba(124,58,237,0.2); } to { background-color: #ede9fe; color: #5b21b6; border-color: #5b21b6 !important; box-shadow: 0 0 10px rgba(124,58,237,0.6); } }
        .illuminate-reset { border-color: #c5221f; background: #c5221f !important; color: white !important; box-shadow: 0 0 12px rgba(197, 34, 31, 0.6); animation: pulse-reset 1.2s infinite alternate; }
        @keyframes pulse-reset { from { box-shadow: 0 0 4px rgba(197, 34, 31, 0.4); } to { box-shadow: 0 0 16px rgba(197, 34, 31, 0.8); } }
        .faded { opacity: 0.35; cursor: not-allowed !important; }
        #play-btn { font-size: 20px; padding: 12px 0; background: #222; color: white; font-weight: bold; width: 100%; border-radius: 8px; margin-top: 5px; }
        #next-btn { font-size: 18px; padding: 10px 0; background: #6f42c1; color: white; font-weight: bold; border-radius: 8px; border-color: #5a32a3; width: 100%; margin-top: 10px; }
        #clear-bases-btn { font-size: 13px; padding: 8px 12px; background: #f4f4f6; color: #333; font-weight: bold; border-radius: 5px; border-color: #ccc; margin-top: 5px; width: 100%; }
        .app-container { display: flex; max-width: 1050px; margin: 0 auto; gap: 20px; align-items: stretch; width: 100%; }
        .left-panel { flex: 1; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .right-panel { flex: 1.2; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .flex-row { display: flex; justify-content: center; gap: 20px; }
        .match-alert { font-size: 13px; font-weight: bold; color: #333; margin: 5px 0; min-height: 18px; text-align: center; }
        .dice-container { display: flex; justify-content: center; gap: 15px; margin: 10px 0; height: 85px; }
        .die-wrapper { position: relative; width: 80px; height: 80px; }
        .die-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.3)); }
        .die-svg path, .die-svg line, .die-svg polygon { stroke: rgba(255, 255, 255, 0.45); stroke-width: 1.75; }
        .die-svg .outer-edge { stroke: rgba(255, 255, 255, 0.85); stroke-width: 2.5; }
        .fill-blue { fill: #0055ff !important; } .fill-red { fill: #ff3333 !important; } .fill-green { fill: #137333 !important; } .fill-gray { fill: #70757a !important; } .fill-orange { fill: #e67e22 !important; }
        .die-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; color: white; z-index: 10; text-shadow: 2px 2px 2px rgba(0,0,0,0.9); }
        #total-display { font-size: 32px; font-weight: bold; margin: 5px 0; color: #111; text-align: center; }
        .action-btn { font-size: 16px; width: 95px; padding: 10px 0; font-weight: bold; border: 2px solid transparent; }
        #hit-btn { background: #e6f4ea; color: #137333; border-color: #137333; }
        #out-btn { background: #fce8e6; color: #c5221f; border-color: #c5221f; }
        #walk-btn { background: #feefc3; color: #b06000; border-color: #b06000; }
        #result-msg { font-size: 18px; font-weight: bold; margin-top: 5px; min-height: 28px; text-align: center; }
        #hit-details { font-size: 14px; color: #444; margin-top: 5px; font-style: italic; font-weight: bold; white-space: pre-line; text-align: center; max-width: 100%; }
        .msg-hit { color: #137333; } .msg-out { color: #c5221f; } .msg-walk { color: #b06000; }
        #hit-die-container { margin-top: 10px; display: flex; justify-content: center; gap: 15px; min-height: 100px; }
        .diamond-container { position: relative; width: 140px; height: 140px; margin: 5px auto; }
        .base { position: absolute; width: 36px; height: 36px; background: #fff; border: 3px solid #ccc; transform: rotate(45deg); cursor: pointer; transition: background-color 0.2s, border-color 0.2s; display: flex; align-items: center; justify-content: center; }
        .base-inner { transform: rotate(-45deg); font-size: 9px; font-weight: bold; color: #777; user-select: none; text-align: center; line-height: 1.1; max-width: 30px; overflow: hidden; }
        .base.occupied { background: #137333; border-color: #0b4b21; }
        .base.occupied .base-inner { color: white; }
        #base-2nd { top: 0px; left: 52px; } #base-3rd { top: 52px; left: 0px; } #base-1st { top: 52px; left: 104px; }
        .score-display { font-size: 14px; font-weight: bold; text-align: center; margin-top: 5px; color: #333; }
        .steal-box { background: #f8f9fa; border: 1px dashed #ccc; padding: 10px; border-radius: 6px; margin-top: 20px; text-align: center; width: 90%; }
        .steal-mini-btn { font-size: 12px; padding: 4px 8px; margin: 2px; }
        .active-steal-trait { background: #e67e22; color: white; border-color: #d35400; }
        .steal-act-btn { background: #fff3cd; color: #856404; border-color: #ffeeba; font-size: 14px; padding: 8px 12px; width: 100%; margin-top: 6px; border-radius: 5px; }
        .bunt-box { background: #f0f4ff; border: 1px dashed #aabfff; padding: 10px; border-radius: 6px; margin-top: 10px; text-align: center; width: 90%; }
        .bunt-mini-btn { font-size: 12px; padding: 4px 8px; margin: 2px; }
        .active-bunt-trait { background: #6f42c1; color: white; border-color: #5a32a3; }
        .bunt-act-btn { background: #e8eaff; color: #3730a3; border-color: #c7d2fe; font-size: 14px; padding: 8px 12px; width: 100%; margin-top: 6px; border-radius: 5px; }
        .trait-row { display: flex; justify-content: center; gap: 12px; margin: 3px 0; flex-wrap: wrap; }
        .trait-group { display: flex; align-items: center; gap: 2px; font-size: 11px; }
        .trait-group span { color: #666; font-weight: bold; margin-right: 2px; }
        .trait-btn { font-size: 11px; padding: 3px 6px; margin: 1px; border-radius: 4px; }
        .trait-btn.active-trait-p { background: #7c3aed; color: white; border-color: #5b21b6; }
        .trait-btn.active-trait-s { background: #0891b2; color: white; border-color: #0e7490; }
        .trait-btn.active-trait-c { background: #059669; color: white; border-color: #047857; }
        .trait-btn.active-trait-norm { background: #9ca3af; color: white; border-color: #6b7280; }
        #action-reminder { display: none; }
        @media (max-width: 700px) {
            body { padding: 4px; justify-content: flex-start; height: auto; min-height: 100vh; }
            .app-container { flex-direction: column; gap: 4px; max-width: 100%; }
            .left-panel, .right-panel { padding: 6px 10px; border-radius: 8px; }
            .section-title { font-size: 11px; margin-bottom: 1px; }
            h2 { margin: 0 0 4px 0; font-size: 16px; }
            button { font-size: 14px; padding: 7px 11px; min-height: 36px; margin: 2px; }
            .diamond-container { width: 130px; height: 130px; }
            .base { width: 38px; height: 38px; }
            .die-wrapper { width: 68px; height: 68px; }
            #play-btn { font-size: 15px; }
            #next-btn { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-panel">
            <div>
                <div class="flex-row">
                    <div>
                        <div class="section-title">Pitcher Hand</div>
                        <button id="pHandL" onclick="setPitcherHand('L')">L</button>
                        <button id="pHandR" onclick="setPitcherHand('R')" class="active-hand">R</button>
                    </div>
                    <div>
                        <div class="section-title">Batter Hand</div>
                        <button id="bHandL" class="illuminate" onclick="setBatterHand('L')">L</button>
                        <button id="bHandR" class="illuminate" onclick="setBatterHand('R')">R</button>
                        <button id="bHandS" class="illuminate" onclick="setBatterHand('S')">S</button>
                    </div>
                </div>
                <div id="matchup-text" class="match-alert">Select Batter Stance</div>
                <hr style="margin: 4px 0; border: 0; border-top: 1px solid #eee;">
                <div style="text-align: center;">
                    <div class="section-title">Pitcher Base Die</div>
                    <div class="row">
                        <button id="p4" onclick="setPitcherDie(4)">d4</button>
                        <button id="p8" onclick="setPitcherDie(8)" class="active-p">d8</button>
                        <button id="p12" onclick="setPitcherDie(12)">d12</button>
                        <button id="p20" onclick="setPitcherDie(20)">d20</button>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 4px;">
                    <div class="section-title">Batter Traits</div>
                    <div class="trait-row">
                        <div class="trait-group">
                            <span>PWR:</span>
                            <button class="trait-btn active-trait-norm" id="tp-minus" onclick="setBatterTrait('power','P-')">P-</button>
                            <button class="trait-btn active-trait-norm" id="tp-norm"  onclick="setBatterTrait('power','NORM')">Norm</button>
                            <button class="trait-btn" id="tp-plus"  onclick="setBatterTrait('power','P+')">P+</button>
                            <button class="trait-btn" id="tp-pp"    onclick="setBatterTrait('power','P++')">P++</button>
                        </div>
                    </div>
                    <div class="trait-row">
                        <div class="trait-group">
                            <span>SPD:</span>
                            <button class="trait-btn" id="ts-minus" onclick="setBatterTrait('speed','S-')">S-</button>
                            <button class="trait-btn active-trait-norm" id="ts-norm"  onclick="setBatterTrait('speed','NORM')">Norm</button>
                            <button class="trait-btn" id="ts-plus"  onclick="setBatterTrait('speed','S+')">S+</button>
                        </div>
                        <div class="trait-group">
                            <span>CON:</span>
                            <button class="trait-btn" id="tc-minus" onclick="setBatterTrait('contact','C-')">C-</button>
                            <button class="trait-btn active-trait-norm" id="tc-norm"  onclick="setBatterTrait('contact','NORM')">Norm</button>
                            <button class="trait-btn" id="tc-plus"  onclick="setBatterTrait('contact','C+')">C+</button>
                        </div>
                    </div>
                </div>
                <button id="play-btn" class="faded" disabled onclick="playAtBat()">PLAY AT BAT</button>
            </div>

            <div>
                <hr style="margin: 4px 0; border: 0; border-top: 1px solid #eee;">
                <div style="text-align: center; margin-bottom: 3px;">
                    <div class="section-title">Outs Tracker (Click to override)</div>
                    <button id="out-cnt-1" onclick="setOutManual(1)">1</button>
                    <button id="out-cnt-2" onclick="setOutManual(2)">2</button>
                    <button id="out-cnt-3" onclick="setOutManual(3)">3</button>
                </div>
                <div class="diamond-container">
                    <div id="base-2nd" class="base" onclick="toggleBase(2)"><span id="rt-2nd" class="base-inner"></span></div>
                    <div id="base-3rd" class="base" onclick="toggleBase(3)"><span id="rt-3rd" class="base-inner"></span></div>
                    <div id="base-1st" class="base" onclick="toggleBase(1)"><span id="rt-1st" class="base-inner"></span></div>
                </div>
                <div class="score-display">Inning Runs: <span id="inning-score">0</span></div>
                <button id="clear-bases-btn" onclick="clearBases()">END INNING (RESET FIELD)</button>
            </div>

            <div>
                <hr style="margin: 4px 0; border: 0; border-top: 1px solid #eee;">
                <div class="section-title" style="text-align:center;">Resolve Outcome</div>
                <div class="flex-row">
                    <button id="hit-btn" class="action-btn faded" disabled onclick="handleHit()">HIT</button>
                    <button id="out-btn" class="action-btn faded" disabled onclick="handleOut()">OUT</button>
                    <button id="walk-btn" class="action-btn faded" disabled onclick="handleWalk()">WALK</button>
                </div>
                <button id="next-btn" style="display: none;" onclick="nextBatter()">NEXT BATTER</button>
            </div>
        </div>
        
        <div class="right-panel">
            <div id="action-reminder" onclick="scrollToActions()"></div>
            <div class="dice-container">
                <div class="die-wrapper">
                    <svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-blue outer-edge" points="50,5 95,50 50,95 5,50"/><line x1="50" y1="5" x2="50" y2="95"/><line x1="5" y1="50" x2="95" y2="50"/></svg>
                    <div id="die-tens" class="die-text">00</div>
                </div>
                <div class="die-wrapper">
                    <svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-red outer-edge" points="50,5 95,50 50,95 5,50"/><line x1="50" y1="5" x2="50" y2="95"/><line x1="5" y1="50" x2="95" y2="50"/></svg>
                    <div id="die-ones" class="die-text">0</div>
                </div>
                <div class="die-wrapper" id="pitcher-die-target">
                    <svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-blue outer-edge" points="50,2 98,35 50,98 2,35"/><line x1="50" y1="2" x2="50" y2="98"/><line x1="2" y1="35" x2="98" y2="35"/><line x1="50" y1="42" x2="2" y2="35"/><line x1="50" y1="42" x2="98" y2="35"/><line x1="50" y1="42" x2="50" y2="98"/></svg>
                    <div id="die-pitch" class="die-text">0</div>
                </div>
            </div>
            <div id="total-display">MSS TOTAL: --</div>
            <div id="result-msg"></div>
            <div id="hit-details"></div>
            <div id="hit-die-container">
                <div id="container-hit" style="display: none; text-align: center;">
                    <div id="hit-die-label" style="font-size: 11px; font-weight: bold; margin-bottom: 2px; color: #137333;">HIT DIE</div>
                    <div class="die-wrapper">
                        <svg class="die-svg" viewBox="0 0 100 100"><polygon id="hit-die-polygon" class="fill-green outer-edge" points="50,2 95,25 95,75 50,98 5,75 5,25" /><polygon points="50,23 80,43 50,80 20,43" /><line x1="50" y1="2" x2="50" y2="23"/><line x1="95" y1="25" x2="80" y2="43"/><line x1="95" y1="75" x2="80" y2="43"/><line x1="50" y1="98" x2="50" y2="80"/><line x1="5" y1="75" x2="20" y2="43"/><line x1="5" y1="25" x2="20" y2="43"/><line x1="80" y1="43" x2="50" y2="80"/><line x1="20" y1="43" x2="50" y2="80"/></svg>
                        <div id="die-hit" class="die-text">--</div>
                    </div>
                </div>
                <div id="container-def" style="display: none; text-align: center;">
                    <div style="font-size: 11px; font-weight: bold; margin-bottom: 2px; color: #70757a;">DEFENSE</div>
                    <div class="die-wrapper">
                        <svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-gray outer-edge" points="50,2 95,25 78,85 22,85 5,25"/><polygon points="50,30 72,46 64,72 36,72 28,46"/><line x1="50" y1="2" x2="50" y2="30"/><line x1="95" y1="25" x2="72" y2="46"/><line x1="78" y1="85" x2="64" y2="72"/><line x1="22" y1="85" x2="36" y2="72"/><line x1="5" y1="25" x2="28" y2="46"/></svg>
                        <div id="die-def" class="die-text">--</div>
                    </div>
                </div>
            </div>
            <div id="steal-panel" class="steal-box" style="display: none;">
                <div class="section-title" style="margin-bottom:2px;">🏃 Base Stealing</div>
                <div id="steal-odds-line" style="font-size: 11px; color: #666; margin-bottom: 2px;"></div>
                <div id="steal-runner-ctx" class="runner-ctx"></div>
                <div style="display: flex; justify-content: space-around; font-size: 12px; margin-bottom: 4px;">
                    <div><span>Catcher:</span><button id="trait-c-norm" class="steal-mini-btn active-steal-trait" onclick="setStealCatcher('NORM')">Norm</button><button id="trait-c-minus" class="steal-mini-btn" onclick="setStealCatcher('D-')">D-</button><button id="trait-c-plus" class="steal-mini-btn" onclick="setStealCatcher('D+')">D+</button></div>
                </div>
                <div id="steal-actions-container"></div>
            </div>
            <div id="bunt-panel" class="bunt-box" style="display: none;">
                <div class="section-title" style="margin-bottom:2px;">📦 Bunt</div>
                <div id="bunt-odds-line" style="font-size: 11px; color: #666; margin-bottom: 2px;"></div>
                <div id="bunt-runner-ctx" class="runner-ctx"></div>
                <div style="font-size: 11px; color: #555; margin-bottom: 4px;">Lead runner advances if successful. Roll d6.</div>
                <div id="bunt-actions-container"></div>
            </div>
        </div>
    </div>

    <script>
        let basePitcherDie = 8;
        let pHand = 'R';
        let bHand = ''; 
        let tens = 0, ones = 0, pitch = 0, mss = 0;
        let bases = { 1: null, 2: null, 3: null };
        let inningRuns = 0;
        let outCount = 0;
        let stealCatcherTrait = 'NORM';
        let stealRunnerTrait = 'NORM';
        let buntCatcherTrait = 'NORM';
        let batterTraits = { power: 'NORM', speed: 'NORM', contact: 'NORM' };
        const dieSteps = [4, 8, 12, 20];

        function newRunner() { return { power: batterTraits.power, speed: batterTraits.speed, contact: batterTraits.contact }; }
        function traitLabel(runner) {
            if (!runner) return '';
            let tags = [];
            if (runner.power !== 'NORM') tags.push(runner.power);
            if (runner.speed !== 'NORM') tags.push(runner.speed);
            if (runner.contact !== 'NORM') tags.push(runner.contact);
            return tags.join(' ');
        }
        function scrollToActions() {
            let target = document.getElementById('steal-panel');
            if (target && target.style.display !== 'none') target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            else { let bunt = document.getElementById('bunt-panel'); if (bunt) bunt.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        }
        function updateActionReminder() {
            let badge = document.getElementById('action-reminder');
            if (!badge) return;
            let stealVisible = document.getElementById('steal-panel').style.display !== 'none';
            let buntVisible  = document.getElementById('bunt-panel').style.display !== 'none';
            if (stealVisible && buntVisible) { badge.innerText = '⚡ Steal or Bunt available — tap to jump'; badge.style.display = 'block'; } 
            else if (stealVisible) { badge.innerText = '🏃 Steal available — tap to jump'; badge.style.display = 'block'; } 
            else if (buntVisible) { badge.innerText = '📦 Bunt available — tap to jump'; badge.style.display = 'block'; } 
            else { badge.style.display = 'none'; }
        }
        function leadRunner() { return bases[3] || bases[2] || bases[1] || null; }
        function renderBases() {
            const ids = { 1: 'base-1st', 2: 'base-2nd', 3: 'base-3rd' };
            const rtIds = { 1: 'rt-1st', 2: 'rt-2nd', 3: 'rt-3rd' };
            for (let b = 1; b <= 3; b++) {
                let el = document.getElementById(ids[b]);
                let rt = document.getElementById(rtIds[b]);
                if (bases[b]) { el.classList.add('occupied'); rt.innerText = traitLabel(bases[b]); } 
                else { el.classList.remove('occupied'); rt.innerText = ''; }
            }
            updateStealPanelVisibility(); updateBuntPanelVisibility();
        }
        function toggleBase(baseNum) { bases[baseNum] = bases[baseNum] ? null : { power:'NORM', speed:'NORM', contact:'NORM' }; renderBases(); }
        function addOuts(amount) { outCount += amount; if (outCount > 3) outCount = 3; renderOutsDisplay(); }
        function setOutManual(targetCount) { outCount = (outCount === targetCount) ? targetCount - 1 : targetCount; renderOutsDisplay(); }
        function renderOutsDisplay() {
            for (let i = 1; i <= 3; i++) {
                let btn = document.getElementById('out-cnt-' + i);
                i <= outCount ? btn.classList.add('active-out') : btn.classList.remove('active-out');
            }
            let resetBtn = document.getElementById('clear-bases-btn');
            if (outCount >= 3) resetBtn.classList.add('illuminate-reset'); else resetBtn.classList.remove('illuminate-reset');
            updateStealPanelVisibility(); updateBuntPanelVisibility();
        }
        function clearBases() { bases = { 1: null, 2: null, 3: null }; inningRuns = 0; outCount = 0; document.getElementById('inning-score').innerText = "0"; renderBases(); renderOutsDisplay(); }
        function trackScore(runs) { if (outCount >= 3) return; if (runs > 0) { inningRuns += runs; document.getElementById('inning-score').innerText = inningRuns; } }
        function updateStealPanelVisibility() {
            let panel = document.getElementById('steal-panel');
            let container = document.getElementById('steal-actions-container');
            let ctxEl = document.getElementById('steal-runner-ctx');
            container.innerHTML = '';
            if (outCount >= 3) { panel.style.display = 'none'; updateActionReminder(); return; }
            let options = [];
            if (bases[1] && bases[2] && !bases[3]) options.push(`<button class="steal-act-btn" onclick="resolveDoubleSteal('2nd_3rd')">Double Steal (2nd & 3rd)</button>`);
            else if (!bases[1] && bases[2] && bases[3]) options.push(`<button class="steal-act-btn" onclick="resolveDoubleSteal('3rd_Home')">Double Steal (3rd & Home)</button>`);
            if (bases[1] && !bases[2]) options.push(`<button class="steal-act-btn" onclick="resolveSingleSteal(2)">Steal 2nd Base</button>`);
            if (bases[2] && !bases[3]) options.push(`<button class="steal-act-btn" onclick="resolveSingleSteal(3)">Steal 3rd Base</button>`);
            if (bases[3]) options.push(`<button class="steal-act-btn" onclick="resolveSingleSteal(4)">Steal Home Plate</button>`);
            if (options.length > 0) {
                panel.style.display = 'block'; container.innerHTML = options.join('');
                let lr = leadRunner(); stealRunnerTrait = lr ? lr.speed : 'NORM';
                ctxEl.innerText = traitLabel(lr) ? `Lead runner traits: ${traitLabel(lr)}` : '';
                updateStealOdds();
            } else { panel.style.display = 'none'; }
            updateActionReminder();
        }
        function setBatterTrait(category, value) {
            batterTraits[category] = value;
            const groups = {
                power:   { ids: ['tp-minus','tp-norm','tp-plus','tp-pp'],   vals: ['P-','NORM','P+','P++'],  cls: 'active-trait-p' },
                speed:   { ids: ['ts-minus','ts-norm','ts-plus'],           vals: ['S-','NORM','S+'],         cls: 'active-trait-s' },
                contact: { ids: ['tc-minus','tc-norm','tc-plus'],           vals: ['C-','NORM','C+'],         cls: 'active-trait-c' },
            };
            let g = groups[category];
            g.ids.forEach((id, i) => {
                let btn = document.getElementById(id);
                btn.classList.remove('active-trait-p','active-trait-s','active-trait-c','active-trait-norm','illuminate-trait');
                if (g.vals[i] === value) btn.classList.add(value === 'NORM' ? 'active-trait-norm' : g.cls);
            });
        }
        function resetBatterTraits() {
            batterTraits = { power: 'NORM', speed: 'NORM', contact: 'NORM' };
            ['tp-minus','tp-norm','tp-plus','tp-pp','ts-minus','ts-norm','ts-plus','tc-minus','tc-norm','tc-plus'].forEach(id => {
                document.getElementById(id).classList.remove('active-trait-p','active-trait-s','active-trait-c','active-trait-norm','illuminate-trait');
            });
            ['tp-norm','ts-norm','tc-norm'].forEach(id => document.getElementById(id).classList.add('active-trait-norm'));
        }
        function setStealCatcher(trait) {
            stealCatcherTrait = trait;
            ['norm', 'plus', 'minus'].forEach(t => document.getElementById('trait-c-' + t).classList.remove('active-steal-trait'));
            let sub = (trait === 'NORM') ? 'norm' : (trait === 'D+') ? 'plus' : 'minus';
            document.getElementById('trait-c-' + sub).classList.add('active-steal-trait');
            updateStealOdds();
        }
        function updateStealOdds() {
            let el = document.getElementById('steal-odds-line');
            if (!el) return;
            let catchMod = (stealCatcherTrait === 'D-') ? 1 : (stealCatcherTrait === 'D+') ? -1 : 0;
            let runMod   = (stealRunnerTrait === 'S-') ? -2 : 0;
            let totalMod = catchMod + runMod;
            function safeOn(threshold) {
                let needed = threshold - totalMod + 1;
                if (stealRunnerTrait === 'S+') needed = threshold - totalMod;
                return Math.min(Math.max(needed, 1), 9);
            }
            let s2 = safeOn(3), s3 = safeOn(4), sh = safeOn(8);
            function pct(n) { return n > 8 ? '0%' : n <= 1 ? '100%' : Math.round((9-n)/8*100)+'%'; }
            let homeStr = stealRunnerTrait === 'S+' ? ` · Home: ${s2>8?'impossible':`${s2}+ (${pct(sh)})`}` : ' · Home: S+ only';
            el.innerText = `d8 roll — 2nd: safe on ${s2}+ (${pct(s2)}) · 3rd: safe on ${s3}+ (${pct(s3)})${homeStr}`;
        }
        function updateBuntOdds() {
            let el = document.getElementById('bunt-odds-line');
            if (!el) return;
            let lr = leadRunner();
            let contact = lr ? lr.contact : 'NORM';
            let mod = (contact === 'C+') ? 1 : (contact === 'C-') ? -1 : 0;
            let bothSafeOn = 6 - mod, lrAdvOn = 4 - mod;
            bothSafeOn = Math.min(Math.max(bothSafeOn, 1), 7);
            lrAdvOn    = Math.min(Math.max(lrAdvOn, 1), 7);
            function d6pct(n) { return n > 6 ? '0%' : n <= 1 ? '100%' : Math.round((7-n)/6*100)+'%'; }
            el.innerText = `d6 roll — LR advances: ${lrAdvOn}+ (${d6pct(lrAdvOn)}) · Both safe: ${bothSafeOn}+ (${d6pct(bothSafeOn)})`;
        }
        function setupStealDieVisual() {
            clearDisplay();
            document.getElementById('hit-die-label').innerText = "STEAL DIE";
            document.getElementById('hit-die-label').style.color = "#e67e22";
            document.getElementById('hit-die-polygon').className.baseVal = "fill-orange outer-edge";
            document.getElementById('container-hit').style.display = 'block';
        }
        function setupBuntDieVisual() {
            clearDisplay();
            document.getElementById('hit-die-label').innerText = "BUNT DIE";
            document.getElementById('hit-die-label').style.color = "#3730a3";
            document.getElementById('hit-die-polygon').className.baseVal = "fill-blue outer-edge";
            document.getElementById('container-hit').style.display = 'block';
        }
        function resetHitDieVisual() {
            document.getElementById('hit-die-label').innerText = "HIT DIE";
            document.getElementById('hit-die-label').style.color = "#137333";
            document.getElementById('hit-die-polygon').className.baseVal = "fill-green outer-edge";
        }
        function resolveSingleSteal(targetBase) {
            setupStealDieVisual();
            let rawRoll = Math.floor(Math.random() * 8) + 1;
            let mod = (stealCatcherTrait === 'D-') ? 1 : (stealCatcherTrait === 'D+') ? -1 : 0;
            if (stealRunnerTrait === 'S-') mod -= 2;
            let finalRoll = rawRoll + mod;
            document.getElementById('die-hit').innerText = rawRoll;
            let isSafe = false;
            if (targetBase === 2) isSafe = (finalRoll > 3 || (finalRoll === 3 && stealRunnerTrait === 'S+'));
            else if (targetBase === 3) isSafe = (finalRoll > 4 || (finalRoll === 4 && stealRunnerTrait === 'S+'));
            else if (targetBase === 4) isSafe = (finalRoll > 8 || (finalRoll === 8 && stealRunnerTrait === 'S+'));
            let msgBox = document.getElementById('result-msg');
            let runner = bases[targetBase - 1];
            if (isSafe) { msgBox.className = "msg-hit"; msgBox.innerText = `SAFE! Stole ${targetBase === 4 ? 'Home' : (targetBase === 2 ? '2nd' : '3rd')}`; bases[targetBase - 1] = null; if (targetBase === 4) trackScore(1); else bases[targetBase] = runner; } 
            else { msgBox.className = "msg-out"; msgBox.innerText = `OUT! Caught stealing.`; bases[targetBase - 1] = null; addOuts(1); }
            renderBases();
        }
        function resolveDoubleSteal(type) {
            setupStealDieVisual();
            let rawRoll = Math.floor(Math.random() * 8) + 1;
            let mod = (stealRunnerTrait === 'S+') ? 1 : (stealRunnerTrait === 'S-') ? -1 : 0;
            let finalRoll = rawRoll + mod;
            document.getElementById('die-hit').innerText = rawRoll;
            let msgBox = document.getElementById('result-msg');
            if (finalRoll <= 3) { msgBox.className = "msg-out"; msgBox.innerText = "OUT! Lead runner cut down."; if (type === '2nd_3rd') bases[2] = null; else bases[3] = null; addOuts(1); } 
            else if (finalRoll <= 5) { msgBox.className = "msg-out"; msgBox.innerText = "OUT! Trailing runner cut down."; if (type === '2nd_3rd') { bases[3] = bases[2]; bases[2] = null; bases[1] = null; } else { trackScore(1); bases[3] = null; bases[2] = null; } addOuts(1); } 
            else { msgBox.className = "msg-hit"; msgBox.innerText = "SUCCESS! Both runners safe."; if (type === '2nd_3rd') { bases[3] = bases[2]; bases[2] = bases[1]; bases[1] = null; } else { trackScore(1); bases[2] = bases[1] || bases[2]; bases[1] = null; bases[3] = null; } }
            renderBases();
        }
        function advanceBasesOnWalk() {
            let runs = 0; let r1 = bases[1], r2 = bases[2], r3 = bases[3];
            if (r1) { if (r2) { if (r3) runs++; else bases[3] = r2; bases[2] = r1; } bases[1] = newRunner(); } else bases[1] = newRunner();
            renderBases(); trackScore(runs);
        }
        function advanceBasesOnHit(type, baseAdvancement) {
            let runs = 0;
            if (type === "HR") { runs = (bases[3] ? 1 : 0) + (bases[2] ? 1 : 0) + (bases[1] ? 1 : 0) + 1; bases = { 1: null, 2: null, 3: null }; } 
            else {
                let r1 = bases[1], r2 = bases[2], r3 = bases[3];
                bases = { 1: null, 2: null, 3: null };
                if (r3) { if (baseAdvancement >= 1) runs++; else bases[3] = r3; }
                if (r2) { let dest = 2 + baseAdvancement; if (dest >= 4) runs++; else bases[dest] = r2; }
                if (r1) { let dest = 1 + baseAdvancement; if (dest >= 4) runs++; else bases[dest] = r1; }
                if (type === "SINGLE") bases[1] = newRunner(); else if (type === "DOUBLE") bases[2] = newRunner(); else if (type === "TRIPLE") bases[3] = newRunner();
            }
            renderBases(); trackScore(runs);
        }
        function setPitcherDie(size) { basePitcherDie = size; document.querySelectorAll('.left-panel button').forEach(b => { if(['p4','p8','p12','p20'].includes(b.id)) b.classList.remove('active-p'); }); document.getElementById('p' + size).classList.add('active-p'); updateMatchup(); updateDieVisualShape(getEffectiveDie()); }
        function setPitcherHand(hand) { pHand = hand; document.getElementById('pHandL').classList.remove('active-hand'); document.getElementById('pHandR').classList.remove('active-hand'); document.getElementById('pHand' + hand).classList.add('active-hand'); updateMatchup(); updateDieVisualShape(getEffectiveDie()); }
        function setBatterHand(hand) { bHand = hand; ['L','R','S'].forEach(h => { document.getElementById('bHand'+h).classList.remove('active-b', 'illuminate'); }); document.getElementById('bHand' + hand).classList.add('active-b'); let playBtn = document.getElementById('play-btn'); playBtn.classList.remove('faded'); playBtn.disabled = false; updateMatchup(); updateDieVisualShape(getEffectiveDie()); }
        function getEffectiveDie() { if (!bHand) return basePitcherDie; if (pHand !== bHand || bHand === 'S') return dieSteps[Math.max(0, dieSteps.indexOf(basePitcherDie) - 1)]; return basePitcherDie; }
        function updateDieVisualShape(dieSize) { let target = document.getElementById('pitcher-die-target'); let cached = document.getElementById('die-pitch').innerText; const svgs = {4: `<svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-blue outer-edge" points="50,5 5,85 95,85"/></svg>`, 8: `<svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-blue outer-edge" points="50,2 98,35 50,98 2,35"/></svg>`, 12: `<svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-blue outer-edge" points="50,2 95,25 78,85 22,85 5,25"/></svg>`, 20: `<svg class="die-svg" viewBox="0 0 100 100"><polygon class="fill-blue outer-edge" points="50,2 95,25 95,75 50,98 5,75 5,25"/></svg>`}; target.innerHTML = svgs[dieSize] + `<div id="die-pitch" class="die-text">${cached}</div>`; }
        function updateMatchup() { let statusBox = document.getElementById('matchup-text'); if (!bHand) { statusBox.innerText = "Select Batter Stance"; return; } let eff = getEffectiveDie(); if (eff < basePitcherDie) { statusBox.innerText = "★ Advantage! d" + basePitcherDie + " ➔ d" + eff; statusBox.style.color = "#137333"; } else { statusBox.innerText = "Same-Hand Matchup (Full d" + basePitcherDie + ")"; statusBox.style.color = "#0055ff"; } }
        function clearDisplay() { document.getElementById('result-msg').innerText = ''; document.getElementById('result-msg').className = ''; document.getElementById('hit-details').innerText = ''; document.getElementById('container-hit').style.display = 'none'; document.getElementById('container-def').style.display = 'none'; }
        function playAtBat() { if (!bHand) return; clearDisplay(); tens = Math.floor(Math.random() * 10) * 10; ones = Math.floor(Math.random() * 10); pitch = Math.floor(Math.random() * getEffectiveDie()) + 1; mss = tens + ones + pitch; document.getElementById('die-tens').innerText = tens === 0 ? "00" : tens; document.getElementById('die-ones').innerText = ones; document.getElementById('die-pitch').innerText = pitch; document.getElementById('total-display').innerText = "MSS TOTAL: " + mss; ['hit-btn', 'out-btn', 'walk-btn'].forEach(id => { document.getElementById(id).classList.remove('faded'); document.getElementById(id).disabled = false; }); document.getElementById('play-btn').classList.add('faded'); document.getElementById('play-btn').disabled = true; }
        function postResolutionLoop() { ['hit-btn', 'out-btn', 'walk-btn'].forEach(id => { document.getElementById(id).classList.add('faded'); document.getElementById(id).disabled = true; }); bHand = ''; ['L','R','S'].forEach(h => { document.getElementById('bHand'+h).classList.remove('active-b'); document.getElementById('bHand'+h).classList.add('illuminate'); }); resetBatterTraits(); updateMatchup(); }
        function handleHit() { resetHitDieVisual(); let hitRoll = Math.floor(Math.random() * 20) + 1; document.getElementById('die-hit').innerText = hitRoll; document.getElementById('container-hit').style.display = 'block'; let adjRoll = hitRoll + ((batterTraits.power === 'P+') ? 1 : (batterTraits.power === 'P++') ? 2 : (batterTraits.power === 'P-') ? -1 : 0); if (adjRoll >= 3 && adjRoll <= 6) { triggerDefenseRoll("SINGLE", {3:"1B", 4:"2B", 5:"3B", 6:"SS"}[adjRoll]); return; } else if (adjRoll >= 15 && adjRoll <= 17) { triggerDefenseRoll("DOUBLE", {15:"LF", 16:"CF", 17:"RF"}[adjRoll]); return; } else if (adjRoll >= 19) advanceBasesOnHit("HR", 4); else if (adjRoll >= 10) advanceBasesOnHit("SINGLE", 2); else advanceBasesOnHit("SINGLE", 1); postResolutionLoop(); }
        function triggerDefenseRoll(type, pos) { let defRoll = Math.floor(Math.random() * 12) + 1; document.getElementById('die-def').innerText = defRoll; document.getElementById('container-def').style.display = 'block'; let msg = document.getElementById('result-msg'); if (defRoll === 12) { msg.innerText = "OUT!"; addOuts(1); } else { let held = (defRoll >= 3 && defRoll <= 9); advanceBasesOnHit(type, held ? (type === "SINGLE" ? 1 : 2) : (type === "SINGLE" ? 2 : 3)); } postResolutionLoop(); }
        function handleOut() { addOuts(1); postResolutionLoop(); }
        function handleWalk() { advanceBasesOnWalk(); postResolutionLoop(); }
        function nextBatter() { clearDisplay(); postResolutionLoop(); }
        function resolveBunt(leadBase) { setupBuntDieVisual(); let rawRoll = Math.floor(Math.random() * 6) + 1; let mod = (leadRunner().contact === 'C+') ? 1 : (leadRunner().contact === 'C-') ? -1 : 0; let finalRoll = rawRoll + mod; document.getElementById('die-hit').innerText = rawRoll; if (finalRoll <= 2) { bases[leadBase] = null; bases[1] = newRunner(); addOuts(1); } else { if (leadBase === 3) trackScore(1); else bases[leadBase + 1] = bases[leadBase]; bases[leadBase] = null; if (finalRoll <= 5) addOuts(1); else bases[1] = newRunner(); } renderBases(); }
        resetBatterTraits();
    </script>
    </body>
